<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>North Star — Choose your plan</title>
<style>
  :root{ --cream:#faf6ef; --card:#fff; --ink:#2c2a26; --muted:#7a7468; --clay:#b9744f; --sage:#8aa18a; --border:#e7e0d4; --r:16px; }
  *{ box-sizing:border-box; } body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--cream); color:var(--ink); }
  .wrap{ max-width:560px; margin:0 auto; padding:40px 20px 80px; }
  h1{ font-size:30px; margin:0 0 6px; } .sub{ color:var(--muted); margin:0 0 24px; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:22px; margin-bottom:18px; }
  label{ display:block; font-weight:600; margin:14px 0 6px; }
  input[type=email], input[type=text]{ width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:10px; font-size:15px; }
  .seg{ display:flex; gap:8px; }
  .seg button{ flex:1; padding:10px; border:1px solid var(--border); background:#fff; border-radius:10px; cursor:pointer; font-size:14px; }
  .seg button.on{ border-color:var(--clay); background:#fdf3ec; color:var(--clay); font-weight:700; }
  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{ width:38px; height:38px; border:1px solid var(--border); background:#fff; border-radius:10px; font-size:18px; cursor:pointer; }
  .stepper .n{ font-size:18px; font-weight:700; min-width:2ch; text-align:center; }
  .row{ display:flex; justify-content:space-between; margin:6px 0; }
  .total{ display:flex; justify-content:space-between; font-weight:700; font-size:18px; border-top:1px solid var(--border); padding-top:10px; margin-top:10px; }
  .go{ width:100%; padding:14px; background:var(--clay); color:#fff; border:0; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; margin-top:10px; }
  .go[disabled]{ opacity:.5; cursor:not-allowed; }
  .muted{ color:var(--muted); font-size:13px; } .err{ color:#b4452f; font-size:14px; margin-top:8px; }
  .trial{ background:#eef5ee; color:#456b45; border-radius:10px; padding:10px 12px; font-size:14px; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Choose your plan</h1>
  <p class="sub">Start your family's North Star. Your plan includes 1 child; add seats for more children or AI-using adults.</p>

  <div class="card">
    <label>Your email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />

    <label>Billing</label>
    <div class="seg" id="interval">
      <button data-int="month" class="on">Monthly</button>
      <button data-int="year">Annual</button>
    </div>

    <label>How many children?</label>
    <div class="stepper"><button data-step-child="-1">−</button><span class="n" id="children">1</span><button data-step-child="1">+</button>
      <span class="muted" id="child-note">includes 1</span></div>

    <label>Additional adults who'll use AI <span class="muted">(optional)</span></label>
    <div class="stepper"><button data-step-adult="-1">−</button><span class="n" id="adults">0</span><button data-step-adult="1">+</button>
      <span class="muted">co-parents, tutors, mentors</span></div>

    <label>Promo code <span class="muted">(optional)</span></label>
    <input id="promo" type="text" placeholder="e.g. your beta code" autocomplete="off" />
    <div class="trial" id="trial" style="display:none"></div>
  </div>

  <div class="card">
    <div id="breakdown"><div class="muted">Loading pricing…</div></div>
    <button class="go" id="go" disabled>Continue to checkout →</button>
    <div class="err" id="err"></div>
    <p class="muted" style="margin-top:12px">After payment you'll create your North Star account with this email, and your subscription links automatically.</p>
  </div>
</div>

<script type="module">
  // Stands in for the real marketing site. The live pricing page would make the
  // same two fetch calls to the public-checkout function.
  const SUPABASE_URL = "https://dsioaopybvbfukouljej.supabase.co";
  const PUBLISHABLE_KEY = "sb_publishable_dtIyt5aJ-7ZRUaxMw2Mseg_uG65wyfv";
  const FN = `${SUPABASE_URL}/functions/v1/public-checkout`;

  async function call(action, payload) {
    const res = await fetch(FN, {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": PUBLISHABLE_KEY, "Authorization": `Bearer ${PUBLISHABLE_KEY}` },
      body: JSON.stringify({ action, payload }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `Request failed (${res.status})`);
    return data;
  }

  let interval = "month", children = 1, adults = 0, prices = null;
  const $ = (id) => document.getElementById(id);
  const money = (amt, cur="usd") => amt == null ? "—" : new Intl.NumberFormat(undefined,{style:"currency",currency:(cur||"usd").toUpperCase()}).format(amt/100);

  function render() {
    $("children").textContent = children;
    $("adults").textContent = adults;
    const extraChild = Math.max(0, children - 1);
    $("child-note").textContent = extraChild ? `includes 1 + ${extraChild} seat${extraChild>1?"s":""}` : "includes 1";
    document.querySelectorAll("[data-int]").forEach(b => b.classList.toggle("on", b.dataset.int === interval));

    const set = prices?.[interval] || {};
    const cur = set.base?.currency || "usd";
    const per = interval === "year" ? "/yr" : "/mo";
    const baseAmt = set.base?.amount ?? null, seatAmt = set.seat?.amount ?? null, aiAmt = set.aiseat?.amount ?? null;
    const total = baseAmt == null ? null : baseAmt + extraChild*(seatAmt||0) + adults*(aiAmt||0);

    if (!prices) { $("breakdown").innerHTML = `<div class="muted">Loading pricing…</div>`; }
    else $("breakdown").innerHTML = `
      <div class="row"><span>Base plan (incl. 1 child)</span><span>${money(baseAmt,cur)}${per}</span></div>
      ${extraChild>0 ? `<div class="row"><span>${extraChild} × child seat</span><span>${money(seatAmt!=null?seatAmt*extraChild:null,cur)}${per}</span></div>`:""}
      ${adults>0 ? `<div class="row"><span>${adults} × adult AI seat</span><span>${money(aiAmt!=null?aiAmt*adults:null,cur)}${per}</span></div>`:""}
      <div class="total"><span>Total</span><span>${money(total,cur)}${per}</span></div>`;
    $("go").disabled = !prices || baseAmt == null;
  }

  document.querySelectorAll("[data-int]").forEach(b => b.addEventListener("click", () => { interval = b.dataset.int; render(); }));
  document.querySelectorAll("[data-step-child]").forEach(b => b.addEventListener("click", () => { children = Math.max(1, children + (+b.dataset.stepChild)); render(); }));
  document.querySelectorAll("[data-step-adult]").forEach(b => b.addEventListener("click", () => { adults = Math.max(0, adults + (+b.dataset.stepAdult)); render(); }));

  $("go").addEventListener("click", async () => {
    $("err").textContent = "";
    const email = $("email").value.trim();
    if (!email) { $("err").textContent = "Please enter your email."; return; }
    $("go").disabled = true; $("go").textContent = "Redirecting…";
    try {
      const { url } = await call("create", {
        interval, email, promoCode: $("promo").value.trim(),
        childSeats: Math.max(0, children - 1), adultSeats: adults,
      });
      window.location.href = url;
    } catch (e) {
      $("err").textContent = e.message || "Couldn't start checkout.";
      $("go").disabled = false; $("go").textContent = "Continue to checkout →";
    }
  });

  // Show a hint when the entered promo unlocks the free trial (purely cosmetic;
  // the real trial is applied server-side at checkout).
  $("promo").addEventListener("input", () => {
    const v = $("promo").value.trim();
    $("trial").style.display = v ? "block" : "none";
    if (v) $("trial").textContent = "If this is a valid beta code, you'll get 30 days free — then your selected plan bills automatically unless you cancel.";
  });

  try { prices = await call("prices"); } catch (e) { $("err").textContent = e.message; }
  render();
</script>
</body>
</html>
