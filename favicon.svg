<svg viewBox="0 0 100 100" width="100" height="100" aria-hidden="true" focusable="false"
              xmlns="http://www.w3.org/2000/svg" class="ns-logo-mark ns-logo-mark--dark" overflow="visible">
    <defs>
      <radialGradient id="nsfav-face" cx="35%" cy="28%" r="80%">
        <stop offset="0%"   stop-color="#3C507A"/>
        <stop offset="100%" stop-color="#0E1626"/>
      </radialGradient>
      <linearGradient id="nsfav-card" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#FFF8E0"/>
        <stop offset="55%"  stop-color="#F4E9C5"/>
        <stop offset="100%" stop-color="#E8DAA2"/>
      </linearGradient>
      <linearGradient id="nsfav-inter" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%"   stop-color="#F5D078"/>
        <stop offset="55%"  stop-color="#E8B547"/>
        <stop offset="100%" stop-color="#8C6612"/>
      </linearGradient>
    </defs>

    <!-- 1. Disc face + delicate gold rim -->
    <circle cx="50" cy="50" r="48" fill="url(#nsfav-face)" stroke="#E8B547" stroke-width="1.1"/>

    <!-- 2. Inner gold detail ring -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="#E8B547" stroke-width="0.45" opacity="0.55"/>

    <g class="lm-ticks" stroke="#E8B547" stroke-width="0.7" stroke-linecap="round" opacity="0.85">
         <line x1="50" y1="5"  x2="50" y2="9"/>
         <line x1="95" y1="50" x2="91" y2="50"/>
         <line x1="50" y1="95" x2="50" y2="91"/>
         <line x1="5"  y1="50" x2="9"  y2="50"/>
       </g>
    <g class="lm-dots" fill="#E8B547" opacity="0.75">
         <circle cx="77.58" cy="22.42" r="0.85"/><circle cx="77.58" cy="77.58" r="0.85"/><circle cx="22.42" cy="77.58" r="0.85"/><circle cx="22.42" cy="22.42" r="0.85"/>
       </g>

    <!-- 3. North decoration (subtle antique diamond just above the north blade tip) -->
    <g class="lm-north-mark">
         <polygon points="50,7.5 51.6,11 50,14.5 48.4,11" fill="#FFF8E0" opacity="0.95"/>
       </g>

    <!-- 4. Four cardinal blades — long cross (cream on dark, navy on light) -->
    <g class="lm-cardinals" fill="url(#nsfav-card)">
      <polygon points="50.00,10.00 53.60,42.00 50,50 46.40,42.00"/>
      <polygon points="88.00,50.00 58.00,53.60 50,50 58.00,46.40"/>
      <polygon points="50.00,88.00 46.40,58.00 50,50 53.60,58.00"/>
      <polygon points="12.00,50.00 42.00,46.40 50,50 42.00,53.60"/>
    </g>

    <!-- 5. Four intercardinal blades — shorter gold diagonals -->
    <g class="lm-inter" fill="url(#nsfav-inter)">
      <polygon points="68.38,31.62 56.08,47.60 50,50 52.40,43.92"/>
      <polygon points="68.38,68.38 52.40,56.08 50,50 56.08,52.40"/>
      <polygon points="31.62,68.38 43.92,52.40 50,50 47.60,56.08"/>
      <polygon points="31.62,31.62 47.60,43.92 50,50 43.92,47.60"/>
    </g>

    <!-- 6. Subtle highlight sliver on the north cardinal blade -->
    <g class="lm-highlights" opacity="0.5" fill="#FFF8E0">
      <polygon points="50,12 50,50 50.5,49.5 50.6,46"/>
    </g>

    <!-- 7. Centre gold pivot -->
    <circle cx="50" cy="50" r="3.1" fill="url(#nsfav-inter)" stroke="#8C6612" stroke-width="0.4"/>
    <circle cx="48.8" cy="48.8" r="0.85" fill="#FFF8E0" opacity="0.95"/>
  </svg>
