# North Star — static SPA, no build step required.
# Hash-based routing means no SPA fallback rule is needed.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache static assets (JS modules, CSS, fonts).
# Invalidate by changing the path or appending a query param.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
