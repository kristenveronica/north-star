# North Star — static SPA, no build step required.
# Hash-based routing means no SPA fallback rule is needed.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always revalidate JS/CSS/HTML. Netlify still serves a 304 when nothing
# has changed (ETag match), so this is cheap — but it means new deploys
# are never blocked by a stale local cache.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# Keep internal docs/copy in version control but DON'T serve them publicly.
# force=true overrides the actual deployed file and returns a 404 instead.
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

# Learning-apps + AI-mentor code lives in /dev while it's still being built.
# It stays version-controlled but is NEVER served on the live MVP site — no
# live module imports it, and this makes doubly sure it can't be reached.
[[redirects]]
  from = "/dev/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/assets/web-copy/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/ARCHITECTURE.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/BILLING.md"
  to = "/404.html"
  status = 404
  force = true
