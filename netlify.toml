# North Star — static SPA, no build step required.
# Hash-based routing means no SPA fallback rule is needed.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Always revalidate JS/CSS/HTML. Netlify still serves a 304 when nothing
# has changed (ETag match), so this is cheap — but it means new deploys
# are never blocked by a stale local cache.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"
